name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  NODE_VERSION: "20"

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - packages/shared-types
          - packages/cards-engine
          - apps/api-service
          - apps/socket-service
          - apps/worker-service
          - apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --workspace=${{ matrix.workspace }}

  # ── Type check ───────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - packages/shared-types
          - packages/cards-engine
          - apps/api-service
          - apps/socket-service
          - apps/worker-service
          - apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared dependencies
        run: |
          npm run build --workspace=packages/shared-types
          npm run build --workspace=packages/cards-engine

      # api-service's typecheck (and worker/socket when they import Prisma
      # models transitively) reads generated types from node_modules/.prisma.
      # The Dockerfile does this too; keep parity here so CI matches what
      # the image build sees.
      - name: Generate Prisma client
        if: matrix.workspace == 'apps/api-service' || matrix.workspace == 'apps/worker-service' || matrix.workspace == 'apps/socket-service'
        run: npx prisma generate --schema=apps/api-service/prisma/schema.prisma

      - name: Type check
        run: npm run typecheck --workspace=${{ matrix.workspace }}

  # ── Unit tests ───────────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: typecheck
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - packages/shared-types
          - packages/cards-engine
          - apps/api-service
          - apps/socket-service
          - apps/worker-service
          - apps/frontend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: card_platform_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared dependencies
        run: |
          npm run build --workspace=packages/shared-types
          npm run build --workspace=packages/cards-engine

      - name: Run Prisma migrations (API only)
        if: matrix.workspace == 'apps/api-service'
        run: |
          cd apps/api-service
          npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/card_platform_test?schema=public

      - name: Run tests
        run: npm run test --workspace=${{ matrix.workspace }}
        env:
          NODE_ENV: test
          AUTH_MODE: dev
          TEST_MODE: "true"
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/card_platform_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret
          VAPID_PUBLIC_KEY: ""
          VAPID_PRIVATE_KEY: ""
          VAPID_SUBJECT: "mailto:test@platform.example.com"
          LOG_LEVEL: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.workspace }}
          path: |
            ${{ matrix.workspace }}/coverage/
          if-no-files-found: ignore

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - packages/shared-types
          - packages/cards-engine
          - apps/api-service
          - apps/socket-service
          - apps/worker-service
          - apps/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared dependencies first
        run: |
          npm run build --workspace=packages/shared-types
          npm run build --workspace=packages/cards-engine

      - name: Build workspace
        run: npm run build --workspace=${{ matrix.workspace }}
        env:
          VITE_API_URL: https://platform.example.com/api/v1
          VITE_SOCKET_URL: https://platform.example.com
          VITE_AUTH_MODE: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.workspace }}
          path: |
            ${{ matrix.workspace }}/dist/
          if-no-files-found: ignore

  # ── Coverage summary ──────────────────────────────────────────────────────────
  coverage-report:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: unit-test
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage-reports/

      - name: List coverage reports
        run: find coverage-reports -name "*.json" -o -name "lcov.info" 2>/dev/null | head -20 || echo "No coverage files found"
