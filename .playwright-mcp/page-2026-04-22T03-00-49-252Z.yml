      - paragraph [ref=e41]: "Play the classic card game Cribbage Online. Also known as Crib, Cribble, and Noddy. Play Cribbage online against your friends. A multiplayer card game traditionally for two players, that involves playing and grouping cards in combinations which gain points. Cribbage has several distinctive features: the cribbage board used for score keeping, the crib, box, or kitty, a separate hand counting for the dealer, two distinct scoring stages (the play and the show), aces low, and a unique scoring system including points for groups of cards that total fifteen. Cribbage is a Trump style Card game for free."
      - paragraph [ref=e42]: This free Cribbage app lets you play the classic card game Cribage Online anywhere without needing your wooden Cribbage pegging board. The playing cards are large so Grandpa will have no trouble playing his favorite board game. All the scoring is automatic using the built-in Cribbage calculator including a breakdown of the point details.
