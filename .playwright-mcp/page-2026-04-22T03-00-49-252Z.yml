      - generic [ref=e125]:
        - heading "How do you play a friend?" [level=3] [ref=e126]
        - paragraph [ref=e127]: "To play a friend do one of the following:"
        - list [ref=e128]:
          - listitem [ref=e129]: The best way is to add them by their Invite Code / cribbage ID (not username). You can find your Invite Code / cribbage ID by clicking on your profile, or going to the online game and it will be in the upper right hand corner. Then go to Online->Play a Friend-> Invite Code
          - listitem [ref=e130]: You can also invite them by email granted they entered their email into their Cribbage profile settings.
          - listitem [ref=e131]: You can also invite them via Facebook invite if you both are friends and using the Facebook version.
          - listitem [ref=e132]: You can also just create a private room and both join it.
          - listitem [ref=e133]: You can also add a friend while playing someone by clicking on the "+Friends" button in game.
        - paragraph [ref=e134]: You both need to friend each other, so exchange IDs so you both can invite each other. Inviting by ID will also allow you send notification invites to each other while offline.
      - generic [ref=e135]:
        - heading "Why is it called Cribbage?" [level=3] [ref=e136]
        - paragraph [ref=e137]: In the 1600s Cribbage was invented by Sir John Suckling. Cribbage is a derived from the game “noddy”.
      - generic [ref=e138]:
        - heading "In what order should you count you hand in Cribbage?" [level=3] [ref=e139]
        - paragraph [ref=e140]: "Scoring your cribbage hand in the follow order is the most common: 15s, runs, pairs, flushes, and nobs."
      - generic [ref=e141]:
        - heading "What is best hand in cribbage?" [level=3] [ref=e142]
        - paragraph [ref=e143]: Cribbage is a combination of luck and skill. Luck can be managed by creating hands that are statistically highest on average. Over many rounds and games well played hands will come out ahead. The pegging stage of Cribbage is highly based on skill. The player has more control over the hand after discarding two cards of their choice. During pegging, both players try to anticipate the other players’ action making this stage highly based on skill.
      - generic [ref=e144]:
        - heading "What is a double pair royal?" [level=3] [ref=e145]
        - paragraph [ref=e146]: A “Double Royal Pair” is a hand with four cards with the same denomination. Four 5s is a Double Royal Pair. The Double Royal Pair worth 12 points by itself and has the possibility of scoring many more points if the 5th card combines well, such as a 10 valued card.
      - generic [ref=e147]:
        - heading "How do you play cribbage for beginners?" [level=3] [ref=e148]
        - paragraph [ref=e149]: To learn Cribbage there can be a learning curve. The best way to learn is to find an experience player that can walk you through the game. There are many online videos do a good job of explain the game. Playing a computer version of Cribbage can do an excellent job teaching a new player how to play. Some contain tutorial and hints to explain each step. If you are learning from a computer version, be sure to learn to count the cards by hand. Many computer versions will do this for you. If you do not learn how to count the cards by hand you will never be able to advance your skill as a player.
      - generic [ref=e150]:
        - heading "Is learning cribbage hard?" [level=3] [ref=e151]
        - paragraph [ref=e152]: There is a learning curve to cribbage. The game consists of 2 main phases with different rules. Learning the rules of Cribbage can be learned in a few hours. Learning to win against a well-seasoned player can take years.
      - generic [ref=e153]:
        - heading "Why are there 3 pegs in Cribbage?" [level=3] [ref=e154]
        - paragraph [ref=e155]: Each colored Cribbage peg set represents a player. Two pegs track the match score. They leapfrog over each other indicating the current score and last noted score. This helps the players see at a glance the amount of awarded point. The third peg is used to indicate the number of wins of a series of games.
      - generic [ref=e156]:
        - heading "Is Queen King Jack a run in Cribbage?" [level=3] [ref=e157]
        - paragraph [ref=e158]: Yes. When pegging, card do not need to be in order to create a sequence as long as there is no gap between the cards breaking the sequence.
      - generic [ref=e159]:
        - heading "Does Nobs count in the crib?" [level=3] [ref=e160]
        - paragraph [ref=e161]: “Nobs”, also know as “His Nobs”, is a Jack of any suit in the hand or the Crib. If the Jack is the same suit as the Starter Card the player counts one point for his nobs.
      - generic [ref=e162]:
        - heading "What does two for his heels mean in Cribbage?" [level=3] [ref=e163]
        - paragraph [ref=e164]: “His Heels, or Nibs is a Jack as the Starter Card and counts for 2 points. Only the deal receives the 2 points. “His Heels” can win the player the game if they require only 2 more points to win.
      - generic [ref=e165]:
        - heading "Is Ace 2 3 a run in Cribbage?" [level=3] [ref=e166]
        - paragraph [ref=e167]: Yes. An Ace represents a one for a straight of 1,2,3 for 3 points
      - generic [ref=e168]:
        - heading "Is Ace high or low in Cribbage?" [level=3] [ref=e169]
        - paragraph [ref=e170]: Aces are low and represent the number 1 when creating a straight.
      - generic [ref=e171]:
        - heading "What happened to Yahoo Cribbage?" [level=3] [ref=e172]
        - paragraph [ref=e173]: Yahoo Games offered a popular version of the card game Cribbage. This version featured a robust online play mode with live players. Yahoo Games was shut down in 2016. The Yahoo Cribbage game was not available after that time.
      - generic [ref=e174]:
        - heading "How is Cribbage related to submarines?" [level=3] [ref=e175]
        - paragraph [ref=e176]: American submariners commonly used Cribbage as a pastime. In the United States Pacific Fleet, the oldest active submarine wardroom carries on board the personal Cribbage board of WWII Rear Admiral Dick O’Kane. The board is moved to the next oldest boat when a boat is decommissioned.
