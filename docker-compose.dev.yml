version: "3.9"

# Card Platform — DEV Docker Compose
# Runs every service in dev mode. Frontend serves via the Vite dev server on
# port 5173 so you get HMR + VITE_AUTH_MODE=dev by default. Back-end services
# reuse the existing production-style Dockerfiles (they already listen on their
# usual ports and accept the env overrides below).
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#
# Then browse:
#   Frontend  : http://localhost:5173
#   API       : http://localhost:3001
#   Socket    : http://localhost:3002

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: card_platform
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d card_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  api-service:
    build:
      context: .
      dockerfile: apps/api-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      AUTH_MODE: dev
      TEST_MODE: "true"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/card_platform?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      API_PORT: 3001
      LOG_LEVEL: debug
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  socket-service:
    build:
      context: .
      dockerfile: apps/socket-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      AUTH_MODE: dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      SOCKET_PORT: 3002
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
      api-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  worker-service:
    build:
      context: .
      dockerfile: apps/worker-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/card_platform?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Vite dev server — HMR, VITE_AUTH_MODE=dev, local JWT issuer.
  frontend:
    image: claudes-cards-frontend-dev
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile.dev
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3001/api/v1
      VITE_SOCKET_URL: http://localhost:3002
      VITE_AUTH_MODE: dev
      VITE_LOG_LEVEL: debug
    ports:
      - "5173:5173"
    depends_on:
      api-service:
        condition: service_healthy
      socket-service:
        condition: service_healthy

volumes:
  postgres_dev_data:
  redis_dev_data:
