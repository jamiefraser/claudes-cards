version: "3.9"

# Card Platform — Development Docker Compose
# All services wired together with healthchecks and dependency ordering.

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: card_platform
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d card_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── Application Services ────────────────────────────────────────────────────

  api-service:
    build:
      context: .
      dockerfile: apps/api-service/Dockerfile
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      NODE_ENV: development
      NODE_OPTIONS: --dns-result-order=ipv4first
      AUTH_MODE: ${AUTH_MODE:-dev}
      TEST_MODE: ${TEST_MODE:-false}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/card_platform?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      API_PORT: 3001
      LOG_LEVEL: ${LOG_LEVEL:-info}
      B2C_AUTHORITY: ${VITE_B2C_AUTHORITY:-}
      B2C_CLIENT_ID: ${VITE_B2C_CLIENT_ID:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@platform.example.com}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  socket-service:
    build:
      context: .
      dockerfile: apps/socket-service/Dockerfile
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      NODE_ENV: development
      NODE_OPTIONS: --dns-result-order=ipv4first
      AUTH_MODE: ${AUTH_MODE:-dev}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      SOCKET_PORT: 3002
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,http://localhost:80,http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      B2C_AUTHORITY: ${VITE_B2C_AUTHORITY:-}
      B2C_CLIENT_ID: ${VITE_B2C_CLIENT_ID:-}
      API_INTERNAL_URL: http://api-service:3001/api/v1
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy
      api-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  worker-service:
    build:
      context: .
      dockerfile: apps/worker-service/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/card_platform?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-prod}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@platform.example.com}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      # Vite bakes env vars at build time, so runtime `environment:` entries
      # don't affect the frontend bundle. Pipe the same AUTH_MODE/LOG_LEVEL
      # host-env through as build args so `docker compose up --build` picks
      # up a local developer's intent (default: dev) without needing to
      # edit the Dockerfile. Production/CI builds override via --build-arg.
      args:
        VITE_AUTH_MODE: ${AUTH_MODE:-dev}
        VITE_LOG_LEVEL: ${LOG_LEVEL:-info}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api/v1}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:3002}
        VITE_B2C_CLIENT_ID: ${VITE_B2C_CLIENT_ID:-}
        VITE_B2C_AUTHORITY: ${VITE_B2C_AUTHORITY:-}
        VITE_B2C_KNOWN_AUTHORITIES: ${VITE_B2C_KNOWN_AUTHORITIES:-}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api-service:
        condition: service_healthy
      socket-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
