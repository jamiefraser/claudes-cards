# cert-manager ClusterIssuer for Let's Encrypt TLS
#
# Prerequisites:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#   # Wait for cert-manager pods to be ready:
#   kubectl wait --for=condition=ready pod -l app=cert-manager -n cert-manager --timeout=120s
#
# After applying this manifest, cert-manager will automatically provision
# TLS certificates for hosts defined in k8s/ingress.yaml.

---
# Staging issuer — use for testing to avoid Let's Encrypt rate limits
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@platform.example.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# Production issuer — use when staging validation passes
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@platform.example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
