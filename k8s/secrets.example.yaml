# Card Platform — Kubernetes Secrets Template
#
# DO NOT commit real secrets to source control.
# Copy this file, populate all values with base64-encoded strings, and apply:
#
#   kubectl apply -f k8s/secrets.yaml -n card-platform
#
# Or preferably use scripts/deploy.sh which handles secret injection from
# .env.{ENV}.secrets via:
#   kubectl create secret generic card-platform-secrets --from-env-file=.env.staging.secrets
#
# To base64-encode a value:
#   echo -n "my-secret-value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: card-platform-secrets
  namespace: card-platform
  labels:
    app.kubernetes.io/managed-by: deploy-script
type: Opaque
data:
  # PostgreSQL connection string
  # Example plain: postgresql://user:password@postgres-host:5432/card_platform?schema=public
  DATABASE_URL: <base64-encoded-value>

  # Redis connection URL
  # Example plain: redis://:password@redis-host:6379
  REDIS_URL: <base64-encoded-value>

  # JWT signing secret (HS256) — AUTH_MODE=dev only; in production use B2C
  JWT_SECRET: <base64-encoded-value>

  # VAPID keys for Web Push notifications (generated by scripts/generate-vapid.sh)
  VAPID_PUBLIC_KEY: <base64-encoded-value>
  VAPID_PRIVATE_KEY: <base64-encoded-value>
  VAPID_SUBJECT: <base64-encoded-value>  # e.g. bWFpbHRvOmFkbWluQHBsYXRmb3JtLmV4YW1wbGUuY29t

  # Azure AD B2C (production only — leave empty or omit for dev AUTH_MODE)
  # B2C_CLIENT_ID: <base64-encoded-value>
  # B2C_TENANT_ID: <base64-encoded-value>
  # B2C_CLIENT_SECRET: <base64-encoded-value>

  # CORS allowed origins for socket-service (comma-separated)
  CORS_ORIGIN: <base64-encoded-value>  # e.g. aHR0cHM6Ly9wbGF0Zm9ybS5leGFtcGxlLmNvbQ==
