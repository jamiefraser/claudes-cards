apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket-deployment
  namespace: card-platform
  labels:
    app: socket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: socket
  template:
    metadata:
      labels:
        app: socket
    spec:
      containers:
        - name: socket
          image: card-platform/socket:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: SOCKET_PORT
              value: "3002"
            - name: AUTH_MODE
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: card-platform-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: card-platform-secrets
                  key: JWT_SECRET
            - name: CORS_ORIGIN
              valueFrom:
                secretKeyRef:
                  name: card-platform-secrets
                  key: CORS_ORIGIN
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      # Socket.io with Redis adapter scales horizontally; sticky sessions not required
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - socket
                topologyKey: kubernetes.io/hostname
